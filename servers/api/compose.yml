services:
  nginx:
    image: nginx:1.29-alpine
    container_name: nginx
    restart: always
    privileged: true
    network_mode: 'host'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./tls:/var/tls:ro
      - /var/htdocs:/var/htdocs:ro
    logging:
      driver: 'json-file'
      options:
        max-size: '200m'
        max-file: '5'

  elysia:
    image: wevisdemo/politigraph:latest
    container_name: elysia
    restart: always
    network_mode: 'host'
    environment:
      BETTER_AUTH_SECRET: $BETTER_AUTH_SECRET
      BETTER_AUTH_URL: https://politigraph.wevis.info
      DATABASE_URL: $DATABASE_URL
      NEO4J_HOST: $NEO4J_HOST
      NEO4J_USERNAME: $NEO4J_USERNAME
      NEO4J_PASSWORD: $NEO4J_PASSWORD
    volumes:
      - /var/htdocs/assets:/app/uploads

  beszel-agent:
    image: henrygd/beszel-agent:0.16
    container_name: beszel-agent
    restart: always
    privileged: true
    network_mode: host
    volumes:
      - beszel_agent:/var/lib/beszel-agent
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      LISTEN: 45876
      HUB_URL: $BESZEL_AGENT_HUB_URL
      TOKEN: $BESZEL_AGENT_TOKEN
      KEY: $BESZEL_AGENT_KEY

  backup:
    image: offen/docker-volume-backup:v2
    container_name: backup
    restart: always
    network_mode: host
    volumes:
      - /var/backup:/archive
      - ./var/htdocs/assets:/backup/assets:ro
    environment:
      AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY
      AWS_S3_BUCKET_NAME: puwv-backup
      AWS_S3_PATH: politigraph-api
      AWS_STORAGE_CLASS: STANDARD_IA
      BACKUP_COMPRESSION: zst
      BACKUP_CRON_EXPRESSION: 0 21 * * 5
      BACKUP_RETENTION_DAYS: 15

volumes:
  beszel_agent:
