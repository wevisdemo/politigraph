server {
  listen 443 ssl default_server reuseport;
  listen [::]:443 ssl default_server reuseport;

  ssl_certificate /var/tls/cert.pem;
  ssl_certificate_key /var/tls/key.pem;
  ssl_trusted_certificate /var/tls/ca.pem;

  server_name politigraph.wevis.info;

  location / {
    root /var/htdocs/docs;
    index index.html;
    try_files $uri $uri/index.html =404;
  }

  location /admin {
    alias /var/htdocs/admin;
    index index.html;
    try_files $uri $uri/ /admin/index.html;
  }

  location /assets {
    if ($request_method = 'GET') {
      add_header 'Access-Control-Allow-Origin' '*' always;
      add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
    }

    alias /var/htdocs/assets;
    try_files $uri =404;
  }

  location /auth {
    proxy_pass http://127.0.0.1:3000/auth;
  }

  location /auth/sign-up {
    return 403 "Forbidden";
  }

  location /graphql {
    if ($request_method = 'OPTIONS') {
      add_header 'Access-Control-Allow-Origin' '*';
      add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
      add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
      add_header 'Access-Control-Max-Age' 1728000;
      add_header 'Content-Type' 'text/plain; charset=utf-8';
      add_header 'Content-Length' 0;
      return 204;
    }
    if ($request_method = 'POST') {
      add_header 'Access-Control-Allow-Origin' '*' always;
      add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
    }
    if ($request_method = 'GET') {
      add_header 'Access-Control-Allow-Origin' '*' always;
      add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
    }

    proxy_pass http://127.0.0.1:3000/graphql;
  }

  location /upload-image {
    proxy_pass http://127.0.0.1:3000/upload-image;
  }
}
